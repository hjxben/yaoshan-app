<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>脉诊分析助手 | 本味汤膳</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --primary: #C0392B;
    --primary-light: #E74C3C;
    --prim-bg: #FFF8F0;
    --accent: #E67E22;
    --card-bg: #FFF8F0;
    --text: #3E2723;
    --text-light: #6D4C41;
    --shadow: 0 2px 12px rgba(192,57,43,0.12);
    --radius: 14px;
  }
  body {
    font-family: -apple-system, "PingFang SC", "Noto Sans SC", "Microsoft YaHei", sans-serif;
    background: var(--prim-bg);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: 100px;
  }
  .header {
    background: linear-gradient(135deg, #C0392B 0%, #E67E22 100%);
    color: #fff;
    text-align: center;
    padding: 18px 20px 14px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header .title { font-size: 20px; font-weight: 700; letter-spacing: 1px; }
  .header .sub {
    font-size: 12px;
    opacity: .85;
    margin-top: 3px;
    letter-spacing: 2px;
  }
  .container { max-width: 640px; margin: 0 auto; padding: 16px; }

  /* Hand sections */
  .hand-section {
    background: #fff;
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 16px;
    box-shadow: var(--shadow);
  }
  .hand-title {
    font-size: 17px;
    font-weight: 700;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .hand-title.left { color: #C0392B; }
  .hand-title.right { color: #2980B9; }

  .pulse-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
  }
  .pulse-card {
    background: var(--prim-bg);
    border-radius: 10px;
    padding: 10px;
    text-align: center;
    border: 1.5px solid #E8D5C0;
  }
  .pulse-card .pos-name {
    font-size: 15px;
    font-weight: 700;
    color: var(--primary);
    margin-bottom: 3px;
  }
  .pulse-card .pos-organ {
    font-size: 11px;
    color: var(--text-light);
    margin-bottom: 8px;
  }
  .pulse-card select {
    width: 100%;
    padding: 6px 4px;
    border: 1.5px solid #E8D5C0;
    border-radius: 8px;
    font-size: 13px;
    background: #fff;
    color: var(--text);
    outline: none;
    -webkit-appearance: none;
    appearance: none;
    text-align: center;
    text-align-last: center;
  }
  .pulse-card select:focus { border-color: var(--primary); }

  /* Analyze button */
  .analyze-area { text-align: center; margin: 8px 0 20px; }
  .btn-analyze {
    padding: 14px 48px;
    border: none;
    border-radius: 28px;
    background: linear-gradient(135deg, #C0392B, #E67E22);
    color: #fff;
    font-size: 17px;
    font-weight: 600;
    cursor: pointer;
    transition: all .2s;
    box-shadow: 0 3px 12px rgba(192,57,43,0.3);
    letter-spacing: 2px;
  }
  .btn-analyze:active { transform: scale(.96); }

  /* Result */
  .result-area { display: none; }
  .result-area.show { display: block; }

  .result-section {
    background: #fff;
    border-radius: var(--radius);
    padding: 16px 18px;
    margin-bottom: 14px;
    box-shadow: var(--shadow);
    border-left: 4px solid var(--accent);
  }
  .result-section h3 {
    font-size: 15px;
    color: var(--primary);
    margin-bottom: 6px;
  }
  .result-section .summary {
    font-size: 14px;
    line-height: 1.8;
    color: var(--text);
  }
  .result-section .detail {
    font-size: 13px;
    line-height: 1.7;
    color: var(--text-light);
    margin-top: 4px;
  }
  .result-section .detail .highlight {
    color: var(--primary);
    font-weight: 600;
  }

  /* Position analysis table */
  .pos-analysis {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-top: 8px;
  }
  .pos-analysis .item {
    padding: 8px 10px;
    background: var(--prim-bg);
    border-radius: 8px;
    font-size: 12px;
    line-height: 1.6;
  }
  .pos-analysis .item .label {
    font-weight: 600;
    color: var(--primary);
  }

  .empty-result {
    text-align: center;
    padding: 30px;
    color: var(--text-light);
  }
  .empty-result .icon { font-size: 36px; }

  /* Bottom Nav */
  .bottom-nav {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: #fff;
    border-top: 1px solid #E8D5C0;
    display: flex;
    padding: 6px 0 env(safe-area-inset-bottom, 6px);
    z-index: 200;
  }
  .bottom-nav a {
    flex: 1;
    text-align: center;
    padding: 6px 0;
    color: #999;
    text-decoration: none;
    font-size: 11px;
  }
  .bottom-nav a.active { color: var(--primary); }
  .bottom-nav a .nav-icon { font-size: 20px; display: block; margin-bottom: 1px; }

  /* Reset */
  .reset-bar {
    display: flex;
    justify-content: flex-end;
    margin-bottom: 8px;
  }
  .reset-btn {
    padding: 5px 12px;
    border: 1px solid #E8D5C0;
    border-radius: 14px;
    font-size: 12px;
    color: var(--text-light);
    background: #fff;
    cursor: pointer;
  }

  /* Disclaimer */
  .disclaimer {
    background: #FFF8E1;
    border-radius: 10px;
    padding: 12px 14px;
    font-size: 12px;
    color: #8D6E63;
    line-height: 1.6;
    margin-top: 12px;
  }
  .disclaimer b { color: #C0392B; }

  @media (max-width: 400px) {
    .pulse-card { padding: 8px 6px; }
    .pulse-card .pos-name { font-size: 14px; }
    .pulse-card select { font-size: 12px; }
    .pos-analysis { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="title">🩺 脉诊分析助手</div>
  <div class="sub">辨脉象 · 知脏腑 · 识病症</div>
</div>

<div class="container">
  <!-- Left Hand -->
  <div class="hand-section">
    <div class="hand-title left">✋ 左手脉象</div>
    <div class="pulse-grid">
      <div class="pulse-card">
        <div class="pos-name">寸 脉</div>
        <div class="pos-organ">心 · 小肠</div>
        <select id="left-cun">
          <option value="">— 选脉象 —</option>
        </select>
      </div>
      <div class="pulse-card">
        <div class="pos-name">关 脉</div>
        <div class="pos-organ">肝 · 胆</div>
        <select id="left-guan">
          <option value="">— 选脉象 —</option>
        </select>
      </div>
      <div class="pulse-card">
        <div class="pos-name">尺 脉</div>
        <div class="pos-organ">肾 · 膀胱</div>
        <select id="left-chi">
          <option value="">— 选脉象 —</option>
        </select>
      </div>
    </div>
  </div>

  <!-- Right Hand -->
  <div class="hand-section">
    <div class="hand-title right">🤚 右手脉象</div>
    <div class="pulse-grid">
      <div class="pulse-card">
        <div class="pos-name">寸 脉</div>
        <div class="pos-organ">肺 · 大肠</div>
        <select id="right-cun">
          <option value="">— 选脉象 —</option>
        </select>
      </div>
      <div class="pulse-card">
        <div class="pos-name">关 脉</div>
        <div class="pos-organ">脾 · 胃</div>
        <select id="right-guan">
          <option value="">— 选脉象 —</option>
        </select>
      </div>
      <div class="pulse-card">
        <div class="pos-name">尺 脉</div>
        <div class="pos-organ">命门 · 肾阳</div>
        <select id="right-chi">
          <option value="">— 选脉象 —</option>
        </select>
      </div>
    </div>
  </div>

  <div class="reset-bar">
    <button class="reset-btn" onclick="resetAll()">↺ 重置</button>
  </div>

  <div class="analyze-area">
    <button class="btn-analyze" onclick="analyze()">🔍 开始分析</button>
  </div>

  <!-- Result -->
  <div class="result-area" id="resultArea">
    <div id="resultContent"></div>
    <div class="disclaimer">
      <b>⚠️ 温馨提示：</b>脉诊分析仅供参考，不能替代专业中医师的四诊合参。
      如有身体不适，请及时到正规中医馆就诊。<br>
      🏪 <b>本味汤膳</b> — 辨体质 · 顺时节 · 知五味 · 养身心
    </div>
  </div>
</div>

<!-- Bottom Nav -->
<div class="bottom-nav">
  <a href="https://hjxben.github.io/yaoshan-app/" class="active">
    <span class="nav-icon">🍵</span> 药膳助手
  </a>
  <a href="#" onclick="return false">
    <span class="nav-icon">🩺</span> 脉诊分析
  </a>
</div>

<script>
// ====================  PULSE TYPES  ====================
const PULSE_TYPES = [
  { id:'normal', name:'平脉 (正常)' },
  { id:'fu', name:'浮脉' },
  { id:'chen', name:'沉脉' },
  { id:'chi', name:'迟脉' },
  { id:'shuo', name:'数脉' },
  { id:'hua', name:'滑脉' },
  { id:'se', name:'涩脉' },
  { id:'xian', name:'弦脉' },
  { id:'xi', name:'细脉' },
  { id:'hong', name:'洪脉' },
  { id:'ru', name:'濡脉' },
  { id:'ruo', name:'弱脉' },
  { id:'jin', name:'紧脉' },
  { id:'huan', name:'缓脉' },
  { id:'jie', name:'结脉' },
  { id:'dai', name:'代脉' },
  { id:'cu', name:'促脉' },
];

// ====================  PULSE KNOWLEDGE BASE  ====================
// position: left-cun, left-guan, left-chi, right-cun, right-guan, right-chi
const PULSE_KNOWLEDGE = {
  // ---- 左手寸脉 (心/小肠) ----
  'left-cun': {
    fu: { syndrome:'风热袭表 / 心经风热', desc:'浮脉主表。左寸浮，提示外感风热之邪侵袭心经或上焦，可见发热、咽痛、心烦。' },
    chen: { syndrome:'心阳不振 / 胸阳痹阻', desc:'沉脉主里。左寸沉，多为心阳不足、胸阳不振，可见胸闷气短、心悸乏力。' },
    chi: { syndrome:'心阳虚寒 / 寒凝心脉', desc:'迟脉主寒。左寸迟，提示心阳不足、寒邪内盛，可见胸痛畏寒、四肢不温。' },
    shuo: { syndrome:'心火上炎', desc:'数脉主热。左寸数，为心火亢盛之象，可见口舌生疮、心烦失眠、小便短赤。' },
    hua: { syndrome:'痰火扰心', desc:'滑脉主痰主热。左寸滑，提示痰火内扰心神，可见心悸易惊、痰多、心烦。' },
    se: { syndrome:'心血瘀阻', desc:'涩脉主血瘀。左寸涩，提示心血运行不畅、心脉瘀阻，可见胸痛如刺、唇舌紫暗。' },
    xian: { syndrome:'肝气犯心 / 气滞心胸', desc:'弦脉主气滞。左寸弦，提示肝气郁结上犯心胸，可见胸胁胀满、心烦易怒。' },
    xi: { syndrome:'心血虚 / 心阴虚', desc:'细脉主虚。左寸细，为心血不足、心阴亏虚，可见心悸失眠、面色无华、头晕。' },
    hong: { syndrome:'心火炽盛', desc:'洪脉主热盛。左寸洪，提示心火亢极，可见壮热烦躁、口舌糜烂、吐血衄血。' },
    ru: { syndrome:'心脾湿困', desc:'濡脉主湿。左寸濡，提示湿浊上蒙心窍，可见头重如裹、胸闷脘痞。' },
    ruo: { syndrome:'心气虚', desc:'弱脉主虚。左寸弱，为心气不足、鼓动无力，可见心悸气短、自汗、易惊。' },
    jin: { syndrome:'寒凝心脉', desc:'紧脉主寒痛。左寸紧，提示寒邪凝滞心脉，可见心痛彻背、遇寒加重。' },
    huan: { syndrome:'心气舒缓 / 正常', desc:'缓脉主正常或湿。左寸缓而有力为常脉，缓而无力多湿困。' },
    jie: { syndrome:'心气不足 / 阴盛气结', desc:'结脉主阴盛气结。左寸结，提示心气不足、脉道不利，可见心悸怔忡、胸闷。' },
    dai: { syndrome:'心气衰微 / 脏气亏虚', desc:'代脉主脏气衰微。左寸代，为心气大虚、脉气不续，可见心悸气短、动则加剧。' },
    cu: { syndrome:'心火亢盛 / 热盛气滞', desc:'促脉主热盛。左寸促，提示心火亢盛、热盛气滞，可见烦躁不安、心慌。' },
  },

  // ---- 左手关脉 (肝/胆) ----
  'left-guan': {
    fu: { syndrome:'肝风上扰', desc:'浮脉主表。左关浮，提示风邪上扰肝经，可见头晕目眩、面红目赤。' },
    chen: { syndrome:'肝郁气滞', desc:'沉脉主里。左关沉，提示肝气郁结、气机不畅，可见胸胁胀满、情志抑郁。' },
    chi: { syndrome:'肝经虚寒', desc:'迟脉主寒。左关迟，提示肝阳不足、寒滞肝脉，可见少腹冷痛、得温则减。' },
    shuo: { syndrome:'肝火上炎', desc:'数脉主热。左关数，提示肝火上炎，可见头痛目赤、口苦咽干、急躁易怒。' },
    hua: { syndrome:'肝经痰热', desc:'滑脉主痰。左关滑，提示肝经痰热互结，可见头晕目眩、恶心口苦。' },
    se: { syndrome:'肝血瘀滞', desc:'涩脉主血瘀。左关涩，提示肝血瘀滞、疏泄不利，可见胁下痞块、面色晦暗。' },
    xian: { syndrome:'肝气郁结 / 肝阳上亢', desc:'弦脉主肝。左关弦，为肝气郁结之典型脉象，可见情志不畅、胸胁胀痛、头晕头痛。' },
    xi: { syndrome:'肝血不足 / 肝阴亏虚', desc:'细脉主虚。左关细，提示肝血不足、肝阴亏虚，可见头晕眼花、爪甲不荣、肢麻。' },
    hong: { syndrome:'肝火炽盛', desc:'洪脉主热盛。左关洪，提示肝火炽盛，可见剧烈头痛、目赤肿痛、吐血。' },
    ru: { syndrome:'肝经湿热', desc:'濡脉主湿。左关濡，提示湿热蕴结肝经，可见胁痛口苦、阴部湿疹。' },
    ruo: { syndrome:'肝气虚', desc:'弱脉主虚。左关弱，为肝气不足、疏泄无力，可见两胁隐痛、精神不振。' },
    jin: { syndrome:'寒滞肝脉', desc:'紧脉主寒痛。左关紧，提示寒邪侵袭肝经，可见少腹冷痛、疝气。' },
    huan: { syndrome:'肝气平和', desc:'左关缓而柔和为常脉，提示肝气条达舒畅。' },
  },

  // ---- 左手尺脉 (肾/膀胱) ----
  'left-chi': {
    fu: { syndrome:'肾虚浮阳 / 阴虚阳浮', desc:'尺脉一般不浮。左尺浮，为肾阴亏虚、虚阳浮越之象，可见头晕耳鸣、潮热盗汗。' },
    chen: { syndrome:'肾阳虚衰', desc:'沉脉主里。尺脉见沉为常。左尺沉而无力，提示肾阳不足，可见腰膝酸冷、畏寒。' },
    chi: { syndrome:'肾阳虚寒', desc:'迟脉主寒。左尺迟，为肾阳亏虚、寒邪内生，可见腰脊冷痛、小便清长。' },
    shuo: { syndrome:'肾阴虚火旺', desc:'数脉主热。左尺数，提示肾阴不足、虚火内扰，可见潮热盗汗、遗精早泄。' },
    hua: { syndrome:'肾经湿热 / 下焦痰浊', desc:'滑脉主痰湿。左尺滑，提示下焦湿热或痰浊，可见小便浑浊、带下黄稠。' },
    se: { syndrome:'肾精亏虚 / 下焦瘀阻', desc:'涩脉主精亏血瘀。左尺涩，为肾精不足或下焦瘀血，可见腰酸、经少、不孕。' },
    xian: { syndrome:'肾虚水泛 / 水气内停', desc:'弦脉主饮。左尺弦，提示肾阳不足、水气内停，可见水肿、小便不利。' },
    xi: { syndrome:'肾阴虚 / 肾精不足', desc:'细脉主虚。左尺细，为肾阴亏虚之象，可见腰膝酸软、头晕耳鸣、咽干。' },
    hong: { syndrome:'肾火亢盛', desc:'左尺洪，提示相火亢盛，可见遗精、尿赤、腰痛。' },
    ru: { syndrome:'肾经湿浊', desc:'左尺濡，提示湿浊下注，可见腰重、带下、小便浑浊。' },
    ruo: { syndrome:'肾气虚 / 肾阳虚', desc:'弱脉主虚。左尺弱，为肾气肾阳不足，可见腰膝酸软、小便频数、阳痿。' },
    jin: { syndrome:'寒客下焦', desc:'左尺紧，提示寒邪侵袭下焦，可见少腹冷痛、腰背拘急。' },
  },

  // ---- 右手寸脉 (肺/大肠) ----
  'right-cun': {
    fu: { syndrome:'风寒束表 / 风热犯肺', desc:'浮脉主表。右寸浮，提示外邪犯肺、肺卫失宣，可见恶寒发热、咳嗽鼻塞。' },
    chen: { syndrome:'肺气郁闭 / 痰浊壅肺', desc:'沉脉主里。右寸沉，提示肺气郁闭不宣，可见胸闷咳喘、痰多难咯。' },
    chi: { syndrome:'肺寒 / 寒饮伏肺', desc:'迟脉主寒。右寸迟，提示寒邪伏肺，可见咳嗽痰白清稀、畏寒。' },
    shuo: { syndrome:'肺热壅盛', desc:'数脉主热。右寸数，提示肺热炽盛，可见咳嗽痰黄、咽痛口渴、发热。' },
    hua: { syndrome:'痰湿壅肺', desc:'滑脉主痰。右寸滑，提示痰湿壅盛于肺，可见咳嗽痰多、胸闷气促。' },
    se: { syndrome:'肺气不足 / 肺络瘀滞', desc:'涩脉主虚瘀。右寸涩，为肺气不足或肺络瘀滞，可见咳声低弱、胸痛。' },
    xian: { syndrome:'肝火犯肺', desc:'弦脉主肝。右寸弦，提示肝气上逆犯肺，可见咳嗽阵作、胸胁胀痛。' },
    xi: { syndrome:'肺气虚 / 肺阴虚', desc:'细脉主虚。右寸细，为肺气或肺阴不足，可见干咳少痰、气短乏力、声低。' },
    hong: { syndrome:'肺热炽盛', desc:'洪脉主热盛。右寸洪，提示肺热亢盛，可见高热咳喘、痰黄如脓。' },
    ru: { syndrome:'痰湿困肺', desc:'濡脉主湿。右寸濡，提示湿痰困肺，可见咳嗽痰多、胸闷脘痞。' },
    ruo: { syndrome:'肺气虚弱', desc:'弱脉主虚。右寸弱，为肺气大虚，可见气短不足以息、自汗、易感冒。' },
    jin: { syndrome:'风寒束肺', desc:'紧脉主寒。右寸紧，提示风寒外束、肺气不宣，可见恶寒重、咳嗽、身痛。' },

// Organ mappings

// Pulse descriptions for general info

// ====================  INIT  ====================
function init() {
  const selects = ['left-cun','left-guan','left-chi','right-cun','right-guan','right-chi'];
  selects.forEach(id => {
    const sel = document.getElementById(id);
    if (!sel) return;
    PULSE_TYPES.forEach(pt => {
      const opt = document.createElement('option');
      opt.value = pt.id;
      opt.textContent = pt.name;
      sel.appendChild(opt);
    });
  });
}

function resetAll() {
  const selects = document.querySelectorAll('select');
  selects.forEach(s => s.value = '');
  document.getElementById('resultArea').classList.remove('show');
}

// ====================  ANALYZE  ====================
function analyze() {
  const positions = ['left-cun','left-guan','left-chi','right-cun','right-guan','right-chi'];
  const selects = positions.map(id => ({ id, value: document.getElementById(id).value, name: document.getElementById(id).selectedOptions?.[0]?.text || '' }));
  
  const filled = selects.filter(s => s.value);
  
  if (filled.length === 0) {
    document.getElementById('resultArea').classList.add('show');
    document.getElementById('resultContent').innerHTML = `
      <div class="empty-result">
        <div class="icon">👆</div>
        <p style="font-size:15px;line-height:1.6">请至少选择一个部位的脉象<br>然后点击"开始分析"</p>
      </div>`;
    document.getElementById('resultArea').scrollIntoView({ behavior: 'smooth' });
    return;
  }

  // Build position analysis details
  let posDetails = '';
  let allSyndromes = [];
  let pulseTypesUsed = [];

  selects.forEach(s => {
    if (!s.value || s.value === 'normal') return;
    const organ = ORGAN_MAP[s.id];
    const knowledge = PULSE_KNOWLEDGE[s.id]?.[s.value];
    const pulseInfo = PULSE_DESC[s.value];
    if (knowledge && pulseInfo) {
      pulseTypesUsed.push(s.value);
      allSyndromes.push(knowledge.syndrome);
      posDetails += `
        <div class="item">
          <span class="label">${organ.name}（${organ.organs}）</span><br>
          <span style="font-weight:600;color:#C0392B">${pulseInfo.name}</span> → ${knowledge.syndrome}<br>
          <span style="font-size:11px;color:#999">${knowledge.desc}</span>
        </div>`;
    }
  });

  // Also show normal ones
  selects.forEach(s => {
    if (s.value !== 'normal') return;
    const organ = ORGAN_MAP[s.id];
    posDetails += `
      <div class="item">
        <span class="label">${organ.name}（${organ.organs}）</span><br>
        <span style="color:#2E7D32;font-weight:600">平脉（正常）</span> → 脉气和缓，脏腑调和
      </div>`;
  });

  // Generate overall summary
  const summary = generateSummary(allSyndromes, pulseTypesUsed, selects);

  document.getElementById('resultArea').classList.add('show');
  document.getElementById('resultContent').innerHTML = `
    <div class="result-section">
      <h3>📊 综合分析</h3>
      <div class="summary">${summary}</div>
    </div>
    <div class="result-section">
      <h3>🔬 各部位脉象分析</h3>
      <div class="pos-analysis">${posDetails}</div>
    </div>
    <div class="result-section">
      <h3>📋 脉象速查</h3>
      ${getPulseQuickRef(pulseTypesUsed)}
    </div>`;

  document.getElementById('resultArea').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function generateSummary(syndromes, pulseTypes, selects) {
  if (syndromes.length === 0 && selects.some(s => s.value === 'normal' || !s.value)) {
    // Check if all selected are normal
    const allNormal = selects.filter(s => s.value).every(s => s.value === 'normal');
    if (allNormal) {
      return '左右六部脉象皆平和从容，节律均匀，脉气和缓有力。<br><br>✅ <b>结论：</b>属正常脉象，提示气血调和、五脏安定、阴阳平衡。当前身体状态良好。';
    }
    if (selects.filter(s => s.value).length === 0) {
      return '请选择至少一个部位的脉象后进行分析。';
    }
    return '部分脉位未选或呈平脉，综合判断信息不足，建议结合更多脉位进行整体分析。';
  }

  // Check for deficiency patterns
  const defPatterns = ['虚','亏','衰','弱','不足'];
  const excessPatterns = ['实','盛','亢','火','热','滞','瘀','痰','湿','寒','郁'];

  let defCount = 0, excCount = 0;
  syndromes.forEach(s => {
    if (defPatterns.some(p => s.includes(p))) defCount++;
    if (excessPatterns.some(p => s.includes(p))) excCount++;
  });

  let conclusion = '';
  const totalAnalyzed = selects.filter(s => s.value && s.value !== 'normal').length;

  if (defCount > excCount && defCount >= 2) {
    conclusion = '总体以<b>虚证</b>为主，提示脏腑气血阴阳有所不足，建议以扶正补益为调养方向。
注意适当休息，避免过劳，可配合对应体质的药膳进行调理。';
  } else if (excCount > defCount && excCount >= 2) {
    conclusion = '总体以<b>实证</b>为主，提示体内有邪气（如热、湿、痰、瘀、寒等）停留，建议以祛邪为调养方向。
注意饮食清淡，忌食辛辣油腻，必要时请中医师辨证施治。';
  } else if (defCount > 0 && excCount > 0) {
    conclusion = '总体呈<b>虚实夹杂</b>之象，既有正气不足，又有邪气留滞。调养上需攻补兼施，建议到中医馆面诊，由专业医师制定个性化调理方案。';
  } else {
    conclusion = '脉象提示身体存在一定偏差，建议结合舌诊、问诊等其他诊法综合判断，可到中医馆进一步辨识调养。';
  }

  // Specific common patterns
  let patternNote = '';
  if (pulseTypes.includes('xian')) {
    patternNote += '⚠️ 弦脉出现频率较高，注意<b>情绪管理</b>，避免恼怒焦虑。';
  }
  if (pulseTypes.includes('hua')) {
    patternNote += patternNote ? '<br>' : '';
    patternNote += '⚠️ 滑脉出现，注意<b>饮食清淡</b>，避免肥甘厚味助湿生痰。';
  }
  if (pulseTypes.includes('xi') || pulseTypes.includes('ruo')) {
    patternNote += patternNote ? '<br>' : '';
    patternNote += '⚠️ 细弱脉提示<b>气血不足</b>，注意休息调养，可配合补益药膳。';
  }

  return `共分析 ${totalAnalyzed} 个脉位。<br><br>
  🔹 涉及证型：${syndromes.join('、')}<br><br>
  🔹 <b>性质判断：</b>${conclusion}<br>
  ${patternNote ? '<br>' + patternNote : ''}`;
}

function getPulseQuickRef(pulseTypes) {
  const unique = [...new Set(pulseTypes)];
  if (unique.length === 0) return '<div style="font-size:13px;color:var(--text-light)">未涉及异常脉象。</div>';

  return unique.map(pt => {
    const info = PULSE_DESC[pt];
    if (!info) return '';
    return `<div style="padding:8px 10px;background:var(--prim-bg);border-radius:8px;margin-bottom:6px;font-size:13px;line-height:1.6">
      <b style="color:#C0392B">${info.name}</b> — ${info.feeling}<br>
      <span style="color:var(--text-light)">${info.desc}</span>
    </div>`;
  }).join('');
}

// Auto-init
init();
</script>
