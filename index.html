<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>药膳推荐助手 | 本味汤膳</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --primary: #C0392B;
    --primary-light: #E74C3C;
    --primary-bg: #FFF8F0;
    --secondary: #2980B9;
    --accent: #E67E22;
    --card-bg: #FFF8F0;
    --text: #3E2723;
    --text-light: #6D4C41;
    --shadow: 0 2px 12px rgba(192,57,43,0.12);
    --radius: 16px;
  }
  body {
    font-family: -apple-system, "PingFang SC", "Noto Sans SC", "Microsoft YaHei", sans-serif;
    background: var(--primary-bg);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: 80px;
  }
  /* Header */
  .header {
    background: linear-gradient(135deg, #C0392B 0%, #E67E22 100%);
    color: #fff;
    padding: 20px 20px 14px;
    text-align: center;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-logo-wrap {
    display: flex;
    justify-content: center;
    margin-bottom: 6px;
  }
  .header-logo-img {
    max-width: 200px;
    max-height: 70px;
    border-radius: 6px;
  }
  .header .subtitle {
    font-size: 12px;
    opacity: .85;
    letter-spacing: 2px;
    margin-top: 4px;
  }

  /* Container */
  .container { max-width: 640px; margin: 0 auto; padding: 16px; }

  /* Selectors */
  .section-title {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    margin: 20px 0 10px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .section-title .icon { font-size: 18px; }
  .badge-group {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 8px 14px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 500;
    background: #fff;
    border: 1.5px solid #E8D5C0;
    color: var(--text-light);
    cursor: pointer;
    transition: all .2s;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  .badge:active { transform: scale(.95); }
  .badge.active {
    background: var(--primary);
    color: #fff;
    border-color: var(--primary);
    box-shadow: 0 2px 8px rgba(139,69,19,.3);
  }

  /* Search bar */
  .search-bar {
    display: flex;
    gap: 8px;
    margin: 12px 0 16px;
  }
  .search-bar input {
    flex: 1;
    padding: 10px 14px;
    border: 1.5px solid #E8D5C0;
    border-radius: 24px;
    font-size: 14px;
    background: #fff;
    outline: none;
    transition: border .2s;
  }
  .search-bar input:focus { border-color: var(--primary); }
  .search-bar button {
    padding: 10px 18px;
    border: none;
    border-radius: 24px;
    background: var(--primary);
    color: #fff;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all .2s;
  }
  .search-bar button:active { transform: scale(.95); }

  /* Count */
  .result-count {
    font-size: 13px;
    color: var(--text-light);
    margin-bottom: 12px;
    padding-left: 2px;
  }
  .result-count span { color: var(--primary); font-weight: 600; }

  /* Card */
  .card {
    background: var(--card-bg);
    border-radius: var(--radius);
    padding: 16px 18px;
    margin-bottom: 14px;
    box-shadow: var(--shadow);
    border-left: 4px solid var(--accent);
    transition: transform .2s;
  }
  .card:active { transform: scale(.98); }
  .card-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 8px;
  }
  .card-title {
    font-size: 16px;
    font-weight: 700;
    color: var(--primary);
  }
  .card-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin: 6px 0;
  }
  .card-tag {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 10px;
    background: #F0E6D6;
    color: var(--text-light);
  }
  .card-tag.season { background: #E6F4EA; color: #2E7D32; }
  .card-tag.efficacy { background: #FFF3E0; color: #E65100; }
  .card-tag.constitution { background: #F3E5F5; color: #7B1FA2; }
  .card-tag.time { background: #E3F2FD; color: #1565C0; }

  .card-body {
    margin-top: 8px;
    font-size: 13px;
    line-height: 1.7;
    color: var(--text-light);
    display: none;
  }
  .card-body.open { display: block; }

  .card-toggle {
    margin-top: 8px;
    font-size: 13px;
    color: var(--primary);
    cursor: pointer;
    font-weight: 500;
    user-select: none;
  }

  .card-ingredients, .card-steps {
    margin-top: 8px;
    padding: 10px 12px;
    background: rgba(255,255,255,.6);
    border-radius: 10px;
  }
  .card-ingredients h4, .card-steps h4 {
    font-size: 13px;
    color: var(--primary);
    margin-bottom: 4px;
  }
  .card-ingredients ul, .card-steps ol {
    padding-left: 18px;
    font-size: 13px;
    line-height: 1.8;
    color: var(--text-light);
  }

  /* Empty */
  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--text-light);
  }
  .empty-state .big-icon { font-size: 48px; margin-bottom: 12px; }
  .empty-state p { font-size: 14px; line-height: 1.6; }

  /* Reset button */
  .reset-btn {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 6px 12px;
    border: 1px solid #E8D5C0;
    border-radius: 16px;
    font-size: 12px;
    color: var(--text-light);
    background: #fff;
    cursor: pointer;
    margin-left: auto;
  }

  /* Modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.45);
    z-index: 999;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: #fff;
    border-radius: var(--radius);
    max-width: 480px;
    width: 100%;
    max-height: 85vh;
    overflow-y: auto;
    padding: 24px 20px 20px;
    box-shadow: 0 8px 32px rgba(0,0,0,.2);
  }
  .modal h2 {
    font-size: 18px;
    color: var(--primary);
    margin-bottom: 4px;
  }
  .modal .sub {
    font-size: 13px;
    color: var(--text-light);
    margin-bottom: 12px;
  }
  .modal-close {
    float: right;
    font-size: 24px;
    line-height: 1;
    cursor: pointer;
    color: #999;
  }
  .modal-body { font-size: 14px; line-height: 1.8; color: var(--text-light); }
  .modal-body b { color: var(--text); }


  /* Constitution Self-Test */
  .quiz-section { display: none; }
  .quiz-section.active { display: block; }
  .quiz-question {
    background: #fff;
    border-radius: var(--radius);
    padding: 16px 18px;
    margin-bottom: 12px;
    box-shadow: var(--shadow);
    border-left: 4px solid var(--accent);
  }
  .quiz-question .q-title {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 6px;
  }
  .quiz-question .q-desc {
    font-size: 13px;
    color: var(--text-light);
    margin-bottom: 10px;
    line-height: 1.6;
  }
  .quiz-options {
    display: flex;
    gap: 10px;
  }
  .quiz-option {
    flex: 1;
    padding: 8px 0;
    text-align: center;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    border: 1.5px solid #E8D5C0;
    background: #fff;
    color: var(--text-light);
    transition: all .2s;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  .quiz-option:active { transform: scale(.95); }
  .quiz-option.yes { border-color: #2E7D32; color: #2E7D32; }
  .quiz-option.yes.selected { background: #2E7D32; color: #fff; }
  .quiz-option.no { border-color: #C62828; color: #C62828; }
  .quiz-option.no.selected { background: #C62828; color: #fff; }
  .quiz-option.mid { border-color: #E65100; color: #E65100; }
  .quiz-option.mid.selected { background: #E65100; color: #fff; }

  .quiz-progress {
    text-align: center;
    font-size: 13px;
    color: var(--text-light);
    margin-bottom: 16px;
  }
  .quiz-progress-bar {
    height: 4px;
    background: #E8D5C0;
    border-radius: 2px;
    margin-top: 6px;
    overflow: hidden;
  }
  .quiz-progress-bar .fill {
    height: 100%;
    background: var(--primary);
    border-radius: 2px;
    transition: width .3s;
  }

  .quiz-result {
    display: none;
    text-align: center;
    padding: 20px;
  }
  .quiz-result.show { display: block; }
  .quiz-result .result-icon { font-size: 48px; margin-bottom: 10px; }
  .quiz-result .result-title {
    font-size: 20px;
    font-weight: 700;
    color: var(--primary);
    margin-bottom: 4px;
  }
  .quiz-result .result-desc {
    font-size: 14px;
    color: var(--text-light);
    line-height: 1.7;
    max-width: 400px;
    margin: 0 auto;
  }
  .quiz-result .result-actions {
    margin-top: 16px;
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
  }
  .quiz-result .result-actions button {
    padding: 10px 20px;
    border: none;
    border-radius: 24px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all .2s;
  }
  .quiz-result .result-actions button:active { transform: scale(.95); }
  .quiz-result .result-actions .btn-primary { background: var(--primary); color: #fff; }
  .quiz-result .result-actions .btn-secondary { background: #f0e6d6; color: var(--text); }

  /* Bottom nav */
  .bottom-nav {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: #fff;
    border-top: 1px solid #E8D5C0;
    display: flex;
    padding: 6px 0 env(safe-area-inset-bottom, 6px);
    z-index: 200;
  }
  .bottom-nav a {
    flex: 1;
    text-align: center;
    padding: 6px 0;
    color: #999;
    text-decoration: none;
    font-size: 11px;
    transition: color .2s;
  }
  .bottom-nav a.active { color: var(--primary); }
  .bottom-nav a .nav-icon { font-size: 20px; display: block; margin-bottom: 1px; }

  /* Random pick animation */
  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.03); }
  }
  .picking .card { animation: pulse .4s ease infinite; }

  @media (max-width: 400px) {
    .badge { font-size: 12px; padding: 6px 11px; }
    .card-title { font-size: 15px; }
  }
</style>
</head>

// ====================  STATE  ====================
let selectedConstitutions = [];
let selectedSeasons = [CURRENT_SEASON];
let selectedEfficacies = [];

// ====================  RENDER  ====================
function renderTags() {
  // Constitutions
  document.getElementById('constitutionTags').innerHTML = CONSTITUTIONS.map(c =>
    `<div class="badge ${selectedConstitutions.includes(c.id)?'active':''}" onclick="toggleConstitution('${c.id}')">${c.name}</div>`
  ).join('');

  // Seasons
  document.getElementById('seasonTags').innerHTML = SEASONS.map(s =>
    `<div class="badge ${selectedSeasons.includes(s.id)?'active':''}" onclick="toggleSeason('${s.id}')">${s.name}</div>`
  ).join('');

  // Efficacies
  document.getElementById('efficacyTags').innerHTML = EFFICACIES.map(e =>
    `<div class="badge ${selectedEfficacies.includes(e)?'active':''}" onclick="toggleEfficacy('${e}')">${e}</div>`
  ).join('');
}

function toggleConstitution(id) {
  const idx = selectedConstitutions.indexOf(id);
  if (idx > -1) selectedConstitutions.splice(idx,1);
  else selectedConstitutions.push(id);
  renderTags();
  filterResults();
}

function toggleSeason(id) {
  if (selectedSeasons.includes(id)) {
    selectedSeasons = [];
  } else {
    selectedSeasons = [id];
  }
  renderTags();
  filterResults();
}

function toggleEfficacy(e) {
  const idx = selectedEfficacies.indexOf(e);
  if (idx > -1) selectedEfficacies.splice(idx,1);
  else selectedEfficacies.push(e);
  renderTags();
  filterResults();
}

function resetAll() {
  selectedConstitutions = [];
  selectedSeasons = [CURRENT_SEASON];
  selectedEfficacies = [];
  document.getElementById('searchInput').value = '';
  renderTags();
  filterResults();
}

// ====================  FILTER & RENDER RESULTS  ====================
function filterResults() {
  const searchVal = document.getElementById('searchInput').value.trim().toLowerCase();

  let filtered = RECIPES.filter(r => {
    // Season filter
    if (selectedSeasons.length > 0) {
      const seasonMatch = r.seasons.some(s => selectedSeasons.includes(s)) || r.seasons.includes('all');
      if (!seasonMatch) return false;
    }
    // Efficacy filter
    if (selectedEfficacies.length > 0) {
      const effMatch = selectedEfficacies.every(e => r.efficacies.includes(e));
      if (!effMatch) return false;
    }
    // Constitution filter
    if (selectedConstitutions.length > 0) {
      const conMatch = selectedConstitutions.some(c => r.constitutions.includes(c));
      if (!conMatch) return false;
    }
    // Search
    if (searchVal) {
      const inName = r.name.includes(searchVal);
      const inIng = r.ingredients.some(i => i.includes(searchVal));
      const inNote = r.note && r.note.includes(searchVal);
      if (!inName && !inIng && !inNote) return false;
    }
    return true;
  });

  // Sort: match by constitution first
  if (selectedConstitutions.length > 0) {
    filtered.sort((a,b) => {
      const aMatch = a.constitutions.filter(c => selectedConstitutions.includes(c)).length;
      const bMatch = b.constitutions.filter(c => selectedConstitutions.includes(c)).length;
      return bMatch - aMatch;
    });
  }

  renderResults(filtered);
}

function renderResults(recipes) {
  const container = document.getElementById('results');
  const countEl = document.getElementById('resultCount');

  countEl.innerHTML = `共 <span>${recipes.length}</span> 道药膳`;

  if (recipes.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="big-icon">🔍</div>
        <p>没有找到匹配的药膳<br>
        试试调整筛选条件</p>
      </div>`;
    return;
  }

  container.innerHTML = recipes.map((r, idx) => {
    const seasonLabels = r.seasons.includes('all')
      ? '<span class="card-tag season">🌤️ 四季皆宜</span>'
      : r.seasons.map(s => {
          const season = SEASONS.find(se => se.id === s);
          return season ? `<span class="card-tag season">${season.name}</span>` : '';
        }).join('');

    return `
      <div class="card" data-index="${idx}">
        <div class="card-header">
          <div>
            <div class="card-title">${r.name}</div>
            <div class="card-tags">
              ${seasonLabels}
              ${r.efficacies.map(e => `<span class="card-tag efficacy">${e}</span>`).join('')}
              ${r.constitutions.map(c => {
                const con = CONSTITUTIONS.find(cc => cc.id === c);
                return con ? `<span class="card-tag constitution">${con.name.replace(/^.{1,2}/,'')}</span>` : '';
              }).join('')}
            </div>
          </div>
        </div>
        <div class="card-body" id="body-${idx}">
          <div class="card-ingredients">
            <h4>📝 食材</h4>
            <ul>${r.ingredients.map(i => `<li>${i}</li>`).join('')}</ul>
          </div>
          <div class="card-steps">
            <h4>👨‍🍳 做法</h4>
            <ol>${r.steps.map(s => `<li>${s}</li>`).join('')}</ol>
          </div>
          ${r.note ? `<div style="margin-top:8px;padding:8px 12px;background:#FFF8E1;border-radius:10px;font-size:13px;color:#6D4C41"><b>💡 小贴士：</b>${r.note}</div>` : ''}
        </div>
        <div class="card-toggle" onclick="toggleBody(${idx})">▼ 查看详情</div>
      </div>`;
  }).join('');
}

function toggleBody(idx) {
  const body = document.getElementById(`body-${idx}`);
  const toggle = body.nextElementSibling;
  const isOpen = body.classList.toggle('open');
  toggle.textContent = isOpen ? '▲ 收起详情' : '▼ 查看详情';
}

// ====================  RANDOM PICK  ====================
function randomPick() {
  const allCards = document.querySelectorAll('.card');
  if (allCards.length === 0) {
    // Try all recipes
    const div = document.getElementById('results');
    div.innerHTML = '<div class="empty-state"><div class="big-icon">🎲</div><p>当前没有结果可选，先放宽筛选条件试试</p></div>';
    return;
  }
  const randomIdx = Math.floor(Math.random() * allCards.length);
  const card = allCards[randomIdx];

  // Scroll to it with highlight
  card.scrollIntoView({ behavior: 'smooth', block: 'center' });

  // Open it
  const body = card.querySelector('.card-body');
  const toggle = card.querySelector('.card-toggle');
  if (body && !body.classList.contains('open')) {
    body.classList.add('open');
    if (toggle) toggle.textContent = '▲ 收起详情';
  }

  // Flash highlight
  card.style.transition = 'background .3s';
  card.style.background = '#FFF8E1';
  setTimeout(() => { card.style.background = ''; }, 1200);
}


// ====================  CONSTITUTION SELF-TEST  ====================
const QUIZ_QUESTIONS = [
  { q:'您是否容易感到疲劳乏力，说话有气无力？',
    desc:'气虚体质的核心特征表现为气力不足、精神不振、容易出汗。', constitution:'qixu' },
  { q:'您是否特别怕冷，手脚经常冰凉？',
    desc:'阳虚体质最大的特点是畏寒怕冷、喜热恶寒、手足不温。', constitution:'yangxu' },
  { q:'您是否经常口干舌燥、手心脚心发热？',
    desc:'阴虚体质阴液不足，易生内热，表现为"干燥+虚热"。', constitution:'yinxu' },
  { q:'您是否体型偏胖、腹部肥满、痰多或感觉身体沉重？',
    desc:'痰湿体质常见于体形肥胖者，表现为痰多、身重、面部出油。', constitution:'tanshi' },
  { q:'您是否脸上容易出油、长痘，或口苦、大便黏腻？',
    desc:'湿热体质以面垢油光、痤疮、口苦、大便黏滞不畅为特征。', constitution:'shire' },
  { q:'您是否面色晦暗、容易有瘀斑、嘴唇颜色偏暗？',
    desc:'血瘀体质以肤色晦暗、色素沉着、舌有瘀斑为主要表现。', constitution:'xueyu' },
  { q:'您是否经常心情郁闷、容易叹气、胸胁胀满？',
    desc:'气郁体质常见神情抑郁、烦闷不乐、胸胁胀满、敏感多虑。', constitution:'qiyu' },
  { q:'您是否容易过敏（如荨麻疹、花粉症、药物过敏）？',
    desc:'特禀体质多为先天因素导致，以各种过敏反应为主要特征。', constitution:'tebing' },
  { q:'您是否平时精力充沛、面色红润、胃口睡眠都很好？',
    desc:'平和质是理想体质状态，阴阳调和、气血充沛、体魄强健。', constitution:'pinghe' },
];

let quizAnswers = [];
let quizCurrent = 0;

function showQuizPage() {
  document.querySelector('.container').style.display = 'none';
  document.querySelectorAll('.bottom-nav a').forEach((a,i) => a.classList.toggle('active', i===1));
  document.getElementById('quizSection').classList.add('active');
  document.getElementById('aboutModal').classList.remove('open');
  initQuiz();
}

function showHomePage() {
  document.querySelector('.container').style.display = 'block';
  document.getElementById('quizSection').classList.remove('active');
  document.querySelectorAll('.bottom-nav a').forEach((a,i) => a.classList.toggle('active', i===0));
}

function initQuiz() {
  quizAnswers = new Array(QUIZ_QUESTIONS.length).fill(null);
  quizCurrent = 0;
  document.getElementById('quizResult').classList.remove('show');
  renderQuizQuestion();
}

function renderQuizQuestion() {
  const container = document.getElementById('quizQuestions');
  const total = QUIZ_QUESTIONS.length;
  
  document.getElementById('qNum').textContent = quizCurrent + 1;
  document.getElementById('qTotal').textContent = total;
  document.getElementById('qProgressFill').style.width = ((quizCurrent) / total * 100) + '%';

  const q = QUIZ_QUESTIONS[quizCurrent];
  const ans = quizAnswers[quizCurrent];
  
  container.innerHTML = `
    <div class="quiz-question">
      <div class="q-title">${q.q}</div>
      <div class="q-desc">${q.desc}</div>
      <div class="quiz-options">
        <div class="quiz-option yes ${ans === true ? 'selected' : ''}" onclick="answerQuiz(true)">✅ 是</div>
        <div class="quiz-option no ${ans === false ? 'selected' : ''}" onclick="answerQuiz(false)">❌ 否</div>
      </div>
    </div>
    <div style="display:flex;gap:10px;margin-top:8px;">
      ${quizCurrent > 0 ? '<button class="reset-btn" onclick="prevQuiz()" style="flex:1;justify-content:center;padding:10px;border-radius:12px;font-size:14px">⬅ 上一题</button>' : ''}
      ${ans !== null ? '<button class="reset-btn" onclick="nextQuiz()" style="flex:1;justify-content:center;padding:10px;border-radius:12px;font-size:14px;background:var(--primary);color:#fff;border-color:var(--primary)">' + (quizCurrent < total - 1 ? '下一题 ➡' : '查看结果 🎯') + '</button>' : ''}
    </div>
  `;
}

function answerQuiz(val) {
  quizAnswers[quizCurrent] = val;
  
  // Quick check: if answer aligns with the constitution type, we tally
  renderQuizQuestion();
  
  // Auto-advance after answering
  setTimeout(() => {
    if (quizCurrent < QUIZ_QUESTIONS.length - 1) {
      nextQuiz();
    } else {
      finishQuiz();
    }
  }, 300);
}

function nextQuiz() {
  if (quizAnswers[quizCurrent] === null) return;
  if (quizCurrent < QUIZ_QUESTIONS.length - 1) {
    quizCurrent++;
    renderQuizQuestion();
  } else {
    finishQuiz();
  }
}

function prevQuiz() {
  if (quizCurrent > 0) {
    quizCurrent--;
    renderQuizQuestion();
  }
}

function finishQuiz() {
  // Calculate result: find the constitution with most "yes" answers
  const counts = {};
  QUIZ_QUESTIONS.forEach((q, i) => {
    if (quizAnswers[i] === true) {
      counts[q.constitution] = (counts[q.constitution] || 0) + 1;
    }
  });
  
  // Find max
  let maxCon = 'pinghe';
  let maxCount = 0;
  for (const [con, cnt] of Object.entries(counts)) {
    if (cnt > maxCount) {
      maxCount = cnt;
      maxCon = con;
    }
  }
  
  // If no "yes" answers, default to pinghe
  if (maxCount === 0) {
    maxCon = 'pinghe';
  }

  // Handle pinghe special case: if q9 is yes and others mostly no
  // Already handled by default

  const con = CONSTITUTIONS.find(c => c.id === maxCon);
  if (!con) return;
  
  // Show result
  document.getElementById('quizQuestions').innerHTML = '';
  document.getElementById('quizProgress').style.display = 'none';
  document.getElementById('quizResult').classList.add('show');
  
  const iconMap = {
    pinghe:'🌿', qixu:'💨', yangxu:'❄️', yinxu:'🔥',
    tanshi:'💧', shire:'☀️', xueyu:'🩸', qiyu:'😔', tebing:'⚠️'
  };
  document.getElementById('resultIcon').textContent = iconMap[maxCon] || '🌿';
  document.getElementById('resultTitle').textContent = con.name.replace(/^.{2}/,'');
  document.getElementById('resultDesc').textContent = con.desc;
  
  // Store result for "查看推荐药膳"
  window._quizResultCon = maxCon;
}

function applyQuizResult() {
  const con = window._quizResultCon || 'pinghe';
  // Switch to home page and auto-select this constitution
  showHomePage();
  selectedConstitutions = [con];
  renderTags();
  filterResults();
  document.getElementById('searchInput').scrollIntoView({ behavior: 'smooth' });
}

function restartQuiz() {
  document.getElementById('quizProgress').style.display = '';
  document.getElementById('quizResult').classList.remove('show');
  initQuiz();
}
